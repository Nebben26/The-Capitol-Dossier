[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# ─── API Reverse Proxies (CORS bypass) ────────────────────────────────
# These MUST come before the SPA fallback redirect

[[redirects]]
  from = "/api/polymarket/*"
  to = "https://gamma-api.polymarket.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/kalshi/*"
  to = "https://api.elections.kalshi.com/trade-api/v2/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/polymarket-data/*"
  to = "https://data-api.polymarket.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/clob/*"
  to = "https://clob.polymarket.com/:splat"
  status = 200
  force = true

# ─── SPA fallback for client-side routing ─────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Cache headers ────────────────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
