[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Redirect /markets (exact) to /screener — old bookmarks still work
[[redirects]]
  from = "/markets"
  to = "/screener"
  status = 301
  force = true
