[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Redirect /markets (exact) to /screener — old bookmarks still work
# Must NOT use /markets/* which would break /markets/[id] detail pages
[[redirects]]
  from = "/markets"
  to = "/screener"
  status = 301
  force = true

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
